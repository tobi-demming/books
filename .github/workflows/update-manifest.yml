name: Update book manifest

# Regenerates books/index.json whenever a .md file is added, removed,
# or renamed in books/. Pushes the updated manifest back to the branch.
# Skips its own commits (uses [skip ci]) to avoid loops.

on:
  push:
    branches: [main]
    paths:
      - "books/**.md"
      - "scripts/build_index.py"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Rebuild manifest
        run: python3 scripts/build_index.py

      - name: Commit manifest if changed
        run: |
          if [[ -n "$(git status --porcelain books/index.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add books/index.json
            git commit -m "chore: update book manifest [skip ci]"
            git push
          else
            echo "Manifest already up to date."
          fi
